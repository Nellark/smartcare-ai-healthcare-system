<div class="page">

  <!-- Header -->
  <div class="header">
    <h2>Patients</h2>
    <a routerLink="/patients/new" class="btn">+ Add Patient</a>
  </div>

  <!-- Error Message -->
  <div class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <!-- Loading State -->
  <div class="loading" *ngIf="isLoading">
    Loading patients...
  </div>

  <!-- Search -->
  <div class="search-box" *ngIf="!isLoading">
    <input
      type="text"
      placeholder="Search patients by name, email or phone..."
      [(ngModel)]="searchTerm"
      (input)="applyFilter()"
    />
  </div>

  <!-- Table -->
  <table class="enterprise-table" *ngIf="!isLoading">
    <thead>
      <tr>
        <th>Name</th>
        <th>Date of Birth</th>
        <th>Age</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let p of paginatedPatients">
        <td>{{ p.firstName }} {{ p.lastName }}</td>
        <td>{{ formatDate(p.dateOfBirth) }}</td>
        <td>{{ p.age }}</td>
        <td>{{ p.phoneNumber }}</td>
        <td>{{ p.email }}</td>
        <td>
          <a class="btn-edit" routerLink="/patients/edit/{{ p.id }}">Edit</a>
          <button class="btn-delete" (click)="deletePatient(p.id)">Delete</button>
        </td>
      </tr>

      <tr *ngIf="paginatedPatients.length === 0">
        <td colspan="6" class="empty">No patients found</td>
      </tr>
    </tbody>
  </table>

  <!-- Pagination -->
  <div class="pagination" *ngIf="!isLoading && totalPages() > 1">
    <button (click)="prevPage()" [disabled]="currentPage === 1">
      Prev
    </button>

    <span>Page {{ currentPage }} of {{ totalPages() }}</span>

    <button (click)="nextPage()" [disabled]="currentPage === totalPages()">
      Next
    </button>
  </div>

  </div>
